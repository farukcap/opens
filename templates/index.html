<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mekan - God Mode</title>
    <style>
        /* ============ FERAH BAHAR TEMASI (SPRING MINT) ============ */
        :root {
            --primary: #4ade80; /* Taze nane yeşili */
            --primary-dark: #22c55e;
            --secondary: #f472b6; /* Çiçek pembesi tonu (bildirimler/kalpler için) */
            --bg-gradient: linear-gradient(135deg, #d4fc79 0%, #96e6a1 100%);
            --bg-app: #f8fafc;
            --surface: rgba(255, 255, 255, 0.75); /* Cam efekti için transparanlık */
            --surface-solid: #ffffff;
            --surface-2: #f1f5f9;
            --text: #334155;
            --text-secondary: #64748b;
            --border: rgba(226, 232, 240, 0.6);
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.02);
            --glass-blur: blur(12px);
        }

        [data-theme="dark"] {
            --primary: #4ade80;
            --primary-dark: #22c55e;
            --secondary: #f472b6;
            --bg-gradient: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            --bg-app: #0f172a;
            --surface: rgba(30, 41, 59, 0.75);
            --surface-solid: #1e293b;
            --surface-2: #334155;
            --text: #f8fafc;
            --text-secondary: #94a3b8;
            --border: rgba(51, 65, 85, 0.6);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text);
            overflow-x: hidden;
        }
        
        button, input, textarea { font-family: inherit; color: inherit; }
        input::placeholder, textarea::placeholder { color: var(--text-secondary); }
        
        /* ============ AUTH & BAŞLANGIÇ ============ */
        .auth-wrapper { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-container { 
            background: var(--surface); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            padding: 40px 30px; border-radius: 24px; width: 100%; max-width: 420px; box-shadow: var(--shadow-lg); border: 1px solid rgba(255,255,255,0.3);
        }
        .auth-container h1 { font-size: 36px; font-weight: 800; margin-bottom: 30px; text-align: center; color: var(--primary-dark); letter-spacing: -1px; }
        .auth-form { display: flex; flex-direction: column; gap: 15px; }
        .input-field { 
            padding: 14px 18px; border: 1px solid var(--border); border-radius: 16px; 
            font-size: 16px; background: var(--surface-solid); transition: all 0.3s; 
        }
        .input-field:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(74, 222, 128, 0.2); }
        .btn-primary { 
            padding: 14px 20px; background: var(--primary); color: white; border: none; 
            border-radius: 20px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; 
            box-shadow: 0 4px 12px rgba(74, 222, 128, 0.3);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(74, 222, 128, 0.4); }
        
        /* ============ ANA YAPI (CAM EFEKTLİ) ============ */
        .app-wrapper { display: flex; min-height: 100dvh; justify-content: center; max-width: 1200px; margin: 0 auto; }
        
        .sidebar-wrapper {
            position: fixed; left: 50%; transform: translateX(-600px); top: 20px; bottom: 20px; width: 260px;
            background: var(--surface); backdrop-filter: var(--glass-blur); border-radius: 24px; border: 1px solid var(--border);
            padding: 20px; display: flex; flex-direction: column; z-index: 1000; box-shadow: var(--shadow);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .main-content {
            flex: 1; max-width: 600px; width: 100%; min-height: 100dvh;
            background: var(--surface); backdrop-filter: var(--glass-blur);
            margin: 0; box-shadow: var(--shadow-lg); position: relative;
        }

        .header {
            position: sticky; top: 0; background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); padding: 15px 20px; z-index: 50;
            display: flex; align-items: center; justify-content: space-between;
        }
        [data-theme="dark"] .header { background: rgba(30, 41, 59, 0.6); }

        /* ============ ÖZEL POST TASARIMLARI (Alıntı & Fısıltı) ============ */
        .post { padding: 20px; border-bottom: 1px solid var(--border); transition: 0.2s; cursor: pointer; }
        .post:hover { background: rgba(0,0,0,0.02); }
        [data-theme="dark"] .post:hover { background: rgba(255,255,255,0.02); }
