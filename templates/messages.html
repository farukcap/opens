    :root {
        --primary: #1D9BF0;
        --dark-bg: #000;
        --card-bg: #16181c;
        --border: #2f3336;
        --text-primary: #f7f9fa;
        --text-secondary: #b7bdc1;
        --text-tertiary: #71767b;
        --hover-bg: #181818;
    }

    body {
        font-family: 'Satoshi', -apple-system, BlinkMacSystemFont, sans-serif;
        background: var(--dark-bg);
        color: var(--text-primary);
        line-height: 1.5;
    }

    .container {
        display: grid;
        grid-template-columns: 350px 1fr;
        min-height: 100vh;
        gap: 0;
    }

    .conversations-list {
        border-right: 1px solid var(--border);
        overflow-y: auto;
        background: var(--dark-bg);
    }

    .list-header {
        position: sticky;
        top: 0;
        background: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid var(--border);
        padding: 16px 20px;
        z-index: 10;
    }

    .list-header h2 {
        font-family: 'Outfit', sans-serif;
        font-size: 20px;
        font-weight: 800;
    }

    .conversation {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        transition: background 0.2s;
        cursor: pointer;
        display: flex;
        gap: 12px;
        align-items: center;
    }

    .conversation:hover {
        background: var(--hover-bg);
    }

    .conversation.active {
        background: var(--card-bg);
        border-left: 4px solid var(--primary);
    }

    .conv-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--primary) 0%, #0d7ebf 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        color: white;
        flex-shrink: 0;
    }

    .conv-info {
        flex: 1;
        min-width: 0;
    }

    .conv-name {
        font-weight: 700;
        color: var(--text-primary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .conv-preview {
        font-size: 13px;
        color: var(--text-tertiary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .chat-area {
        display: flex;
        flex-direction: column;
        background: var(--dark-bg);
    }

    .chat-header {
        border-bottom: 1px solid var(--border);
        padding: 16px 20px;
        font-family: 'Outfit', sans-serif;
        font-size: 20px;
        font-weight: 800;
        background: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(10px);
    }

    .messages-container {
        flex: 1;
        overflow-y: auto;
        padding: 16px 20px;
    }

    .message {
        display: flex;
        margin-bottom: 16px;
        gap: 12px;
    }

    .message.sent {
        flex-direction: row-reverse;
    }

    .message-content {
        max-width: 60%;
        background: var(--card-bg);
        padding: 12px 16px;
        border-radius: 12px;
    }

    .message.sent .message-content {
        background: var(--primary);
        color: white;
    }

    .message-time {
        font-size: 12px;
        color: var(--text-tertiary);
        margin-top: 4px;
    }

    .message-input-area {
        border-top: 1px solid var(--border);
        padding: 16px 20px;
        display: flex;
        gap: 12px;
        align-items: flex-end;
    }

    .input-textarea {
        flex: 1;
        background: var(--card-bg);
        border: 1px solid var(--border);
        color: var(--text-primary);
        padding: 12px 16px;
        border-radius: 20px;
        font-family: 'Satoshi', sans-serif;
        font-size: 15px;
        resize: none;
        min-height: 48px;
        max-height: 120px;
        transition: border 0.2s;
    }

    .input-textarea:focus {
        outline: none;
        border-color: var(--primary);
    }

    .send-btn {
        background: var(--primary);
        color: white;
        border: none;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        transition: background 0.2s;
        flex-shrink: 0;
    }

    .send-btn:hover {
        background: #1a8cd8;
    }

    .send-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }

    .empty-chat {
        display: flex;
        align-items: center;
        justify-content: center;
        flex: 1;
        text-align: center;
        color: var(--text-tertiary);
    }

    .empty-icon {
        font-size: 64px;
        margin-bottom: 20px;
    }

    .empty-title {
        font-family: 'Outfit', sans-serif;
        font-size: 24px;
        font-weight: 700;
        color: var(--text-primary);
        margin-bottom: 8px;
    }

    @media (max-width: 768px) {
        .container {
            grid-template-columns: 1fr;
        }

        .conversations-list {
            display: none;
        }

        .message-content {
            max-width: 85%;
        }
    }

    /* Scrollbar */
    .conversations-list::-webkit-scrollbar,
    .messages-container::-webkit-scrollbar {
        width: 8px;
    }

    .conversations-list::-webkit-scrollbar-thumb,
    .messages-container::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 4px;
    }
</style>

    <div class="container">
        <!-- Conversations List -->
        <div class="conversations-list">
            <div class="list-header">
                <h2>✉️ Mesajlar</h2>

```
        <div id="conversationsList">
            {% if conversations %}
                {% for conv in conversations %}
                <div class="conversation" onclick="selectConversation('{{ conv[0] }}')">
                    <div class="conv-avatar">{{ conv[0][0].upper() }}</div>
                    <div class="conv-info">
                        <div class="conv-name">{{ conv[0] }}</div>
                        <div class="conv-preview">@{{ conv[0] }}</div>
                    </div>
                </div>
                {% endfor %}
            {% else %}
            <div style="padding: 20px; text-align: center; color: var(--text-tertiary);">
                Henüz hiç mesajın yok
            </div>
            {% endif %}
        </div>
    </div>

    <!-- Chat Area -->
    <div class="chat-area" id="chatArea">
        <div class="empty-chat">
            <div>
                <div class="empty-icon">💬</div>
                <div class="empty-title">Mesajlarını Seç</div>
                <div>Konuşmaya başla</div>
            </div>
        </div>
    </div>
</div>

<script>
    function selectConversation(username) {
        // Redirect to conversation
        window.location.href = `/message/${username}`;
    }

    document.addEventListener('DOMContentLoaded', () => {
        // Check if there's a selected conversation
        const currentUrl = window.location.pathname;
        if (currentUrl === '/messages') {
            // No conversation selected
            return;
        }
    });
</script>
