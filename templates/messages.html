<html lang="tr">
<head>
    <meta charset="UTF-8">

    <title>Mesajlar - Bizim Mekan</title>

```
    :root {
        --primary: #FF6B9D;
        --secondary: #FFA07A;
        --light-bg: #FFF9F5;
        --white: #FFFFFF;
        --text-dark: #2D3436;
        --text-light: #636E72;
        --border-light: #F5E6D3;
        --success: #6DD5ED;
        --shadow: 0 10px 30px rgba(255, 107, 157, 0.15);
    }

    html {
        scroll-behavior: smooth;
    }

    body {
        font-family: 'Quicksand', 'Poppins', sans-serif;
        background: linear-gradient(135deg, #FFF9F5 0%, #FFEFE7 50%, #FFF5F0 100%);
        color: var(--text-dark);
        line-height: 1.6;
        min-height: 100vh;
    }

    .container {
        display: grid;
        grid-template-columns: 320px 1fr;
        gap: 20px;
        padding: 20px;
        max-width: 1200px;
        margin: 0 auto;
        min-height: 100vh;
    }

    .conversations-list {
        background: var(--white);
        border-radius: 25px;
        box-shadow: var(--shadow);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        height: fit-content;
        position: sticky;
        top: 20px;
    }

    .list-header {
        background: linear-gradient(135deg, rgba(255, 107, 157, 0.1) 0%, rgba(255, 160, 122, 0.1) 100%);
        padding: 20px;
        border-bottom: 2px solid var(--border-light);
    }

    .list-header h2 {
        font-family: 'Poppins', sans-serif;
        font-size: 20px;
        font-weight: 800;
        color: var(--primary);
    }

    .conversations {
        overflow-y: auto;
        max-height: calc(100vh - 100px);
    }

    .conversation {
        padding: 16px 20px;
        border-bottom: 1px solid var(--border-light);
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .conversation:hover {
        background: rgba(255, 107, 157, 0.05);
    }

    .conversation.active {
        background: linear-gradient(135deg, rgba(255, 107, 157, 0.1) 0%, rgba(255, 160, 122, 0.1) 100%);
        border-left: 4px solid var(--primary);
        padding-left: 16px;
    }

    .conv-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        color: white;
        flex-shrink: 0;
        font-size: 14px;
    }

    .conv-info {
        flex: 1;
        min-width: 0;
    }

    .conv-name {
        font-weight: 700;
        color: var(--text-dark);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        font-size: 14px;
    }

    .conv-preview {
        font-size: 12px;
        color: var(--text-light);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .chat-area {
        background: var(--white);
        border-radius: 25px;
        box-shadow: var(--shadow);
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    .chat-header {
        background: linear-gradient(135deg, rgba(255, 107, 157, 0.1) 0%, rgba(255, 160, 122, 0.1) 100%);
        padding: 20px;
        border-bottom: 2px solid var(--border-light);
        display: flex;
        align-items: center;
        gap: 16px;
    }

    .back-btn {
        background: none;
        border: none;
        color: var(--primary);
        font-size: 20px;
        cursor: pointer;
        padding: 8px;
        font-weight: 700;
    }

    .back-btn:hover {
        opacity: 0.7;
    }

    .header-info {
        flex: 1;
    }

    .header-username {
        font-family: 'Poppins', sans-serif;
        font-size: 16px;
        font-weight: 800;
        color: var(--text-dark);
    }

    .header-handle {
        font-size: 12px;
        color: var(--text-light);
    }

    .messages-container {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .empty-chat {
        display: flex;
        align-items: center;
        justify-content: center;
        flex: 1;
        text-align: center;
        color: var(--text-light);
    }

    .empty-icon {
        font-size: 60px;
        margin-bottom: 16px;
    }

    .empty-title {
        font-family: 'Poppins', sans-serif;
        font-size: 20px;
        font-weight: 700;
        color: var(--text-dark);
        margin-bottom: 8px;
    }

    .message {
        display: flex;
        gap: 8px;
        animation: slideUp 0.3s ease-out;
    }

    .message.sent {
        flex-direction: row-reverse;
    }

    @keyframes slideUp {
        from {
            opacity: 0;
            transform: translateY(10px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .message-bubble {
        max-width: 60%;
        background: linear-gradient(135deg, rgba(255, 107, 157, 0.1) 0%, rgba(255, 160, 122, 0.1) 100%);
        padding: 12px 16px;
        border-radius: 16px;
        word-break: break-word;
        border: 1px solid var(--border-light);
        color: var(--text-dark);
    }

    .message.sent .message-bubble {
        background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
        color: white;
        border: none;
    }

    .message-time {
        font-size: 11px;
        color: var(--text-light);
        margin-top: 4px;
        text-align: center;
    }

    .input-area {
        border-top: 2px solid var(--border-light);
        padding: 16px 20px;
        display: flex;
        gap: 12px;
        align-items: flex-end;
        background: rgba(255, 107, 157, 0.02);
    }

    .input-field {
        flex: 1;
        background: var(--light-bg);
        border: 2px solid var(--border-light);
        color: var(--text-dark);
        padding: 12px 16px;
        border-radius: 15px;
        font-family: 'Quicksand', sans-serif;
        font-size: 14px;
        resize: none;
        min-height: 44px;
        max-height: 120px;
        outline: none;
        transition: all 0.3s ease;
    }

    .input-field:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 4px rgba(255, 107, 157, 0.1);
    }

    .input-field::placeholder {
        color: var(--text-light);
    }

    .send-btn {
        background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
        color: white;
        border: none;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        transition: all 0.3s ease;
        flex-shrink: 0;
        font-weight: 700;
    }

    .send-btn:hover:not(:disabled) {
        transform: translateY(-3px);
        box-shadow: var(--shadow);
    }

    .send-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }

    ::-webkit-scrollbar {
        width: 8px;
    }

    ::-webkit-scrollbar-thumb {
        background: rgba(255, 107, 157, 0.3);
        border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 107, 157, 0.5);
    }

    @media (max-width: 900px) {
        .container {
            grid-template-columns: 1fr;
        }

        .conversations-list {
            position: static;
            max-height: 200px;
        }

        .conversations {
            max-height: 150px;
        }

        .message-bubble {
            max-width: 80%;
        }
    }

    @media (max-width: 600px) {
        .container {
            padding: 12px;
            gap: 12px;
        }

        .conversations-list {
            display: none;
        }

        .chat-area {
            border-radius: 20px;
        }

        .message-bubble {
            max-width: 85%;
        }

        .input-field {
            font-size: 13px;
        }

        .chat-header {
            padding: 16px;
        }

        .messages-container {
            padding: 16px;
        }

        .input-area {
            padding: 12px 16px;
        }
    }
</style>
```

    <div class="container">
        <!-- Conversations List -->
        <div class="conversations-list">
            <div class="list-header">
                <h2>💬 Mesajlar</h2>
            </div>

```
        <div class="conversations" id="conversationsList">
            {% if conversations %}
                {% for conv in conversations %}
                <div class="conversation" onclick="selectConversation('{{ conv[0] }}')">
                    <div class="conv-avatar">{{ conv[0][0].upper() }}</div>
                    <div class="conv-info">
                        <div class="conv-name">{{ conv[0] }}</div>
                        <div class="conv-preview">@{{ conv[0] }}</div>
                    </div>
                </div>
                {% endfor %}
            {% else %}
            <div style="padding: 20px; text-align: center; color: var(--text-light); font-size: 14px;">
                Henüz hiç mesajın yok
            </div>
            {% endif %}
        </div>
    </div>

    <!-- Chat Area -->
    <div class="chat-area" id="chatArea">
        <div class="empty-chat">
            <div>
                <div class="empty-icon">💬</div>
                <div class="empty-title">Mesajlarını Seç</div>
                <div>Konuşmaya başla</div>
            </div>
        </div>
    </div>
</div>

<script>
    function selectConversation(username) {
        window.location.href = `/message/${username}`;
    }
</script>
