    :root {
        --primary: #FF6B9D;
        --secondary: #FFA07A;
        --light-bg: #FFF9F5;
        --white: #FFFFFF;
        --text-dark: #2D3436;
        --text-light: #636E72;
        --border-light: #F5E6D3;
        --shadow: 0 10px 30px rgba(255, 107, 157, 0.15);
    }

    html {
        scroll-behavior: smooth;
    }

    body {
        font-family: 'Quicksand', 'Poppins', sans-serif;
        background: linear-gradient(135deg, #FFF9F5 0%, #FFEFE7 50%, #FFF5F0 100%);
        color: var(--text-dark);
        line-height: 1.6;
    }

    .container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        max-width: 800px;
        margin: 0 auto;
        background: var(--white);
        border-radius: 25px;
        margin: 20px;
        overflow: hidden;
        box-shadow: var(--shadow);
    }

    .chat-header {
        background: linear-gradient(135deg, rgba(255, 107, 157, 0.1) 0%, rgba(255, 160, 122, 0.1) 100%);
        padding: 16px 20px;
        display: flex;
        align-items: center;
        gap: 12px;
        border-bottom: 2px solid var(--border-light);
        position: sticky;
        top: 0;
        z-index: 10;
    }

    .back-btn {
        background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
        border: none;
        color: white;
        font-size: 14px;
        cursor: pointer;
        padding: 10px 14px;
        border-radius: 10px;
        font-weight: 700;
        font-family: 'Quicksand', sans-serif;
        transition: all 0.3s ease;
    }

    .back-btn:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow);
    }

    .header-info {
        flex: 1;
    }

    .header-username {
        font-family: 'Poppins', sans-serif;
        font-size: 16px;
        font-weight: 800;
        color: var(--text-dark);
    }

    .header-handle {
        font-size: 12px;
        color: var(--text-light);
    }

    .messages-container {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .message {
        display: flex;
        gap: 8px;
        animation: slideUp 0.3s ease-out;
    }

    .message.sent {
        flex-direction: row-reverse;
    }

    @keyframes slideUp {
        from {
            opacity: 0;
            transform: translateY(10px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .message-bubble {
        max-width: 60%;
        background: linear-gradient(135deg, rgba(255, 107, 157, 0.1) 0%, rgba(255, 160, 122, 0.1) 100%);
        padding: 12px 16px;
        border-radius: 16px;
        word-break: break-word;
        border: 1px solid var(--border-light);
        color: var(--text-dark);
        font-size: 14px;
        line-height: 1.5;
    }

    .message.sent .message-bubble {
        background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
        color: white;
        border: none;
    }

    .message-time {
        font-size: 11px;
        color: var(--text-light);
        margin-top: 4px;
        text-align: center;
    }

    .input-area {
        border-top: 2px solid var(--border-light);
        padding: 16px 20px;
        display: flex;
        gap: 12px;
        align-items: flex-end;
        background: rgba(255, 107, 157, 0.02);
    }

    .input-field {
        flex: 1;
        background: var(--light-bg);
        border: 2px solid var(--border-light);
        color: var(--text-dark);
        padding: 12px 16px;
        border-radius: 15px;
        font-family: 'Quicksand', sans-serif;
        font-size: 14px;
        resize: none;
        min-height: 44px;
        max-height: 120px;
        outline: none;
        transition: all 0.3s ease;
    }

    .input-field:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 4px rgba(255, 107, 157, 0.1);
    }

    .input-field::placeholder {
        color: var(--text-light);
    }

    .send-btn {
        background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
        color: white;
        border: none;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        transition: all 0.3s ease;
        flex-shrink: 0;
    }

    .send-btn:hover:not(:disabled) {
        transform: translateY(-3px);
        box-shadow: var(--shadow);
    }

    .send-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }

    ::-webkit-scrollbar {
        width: 8px;
    }

    ::-webkit-scrollbar-thumb {
        background: rgba(255, 107, 157, 0.3);
        border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 107, 157, 0.5);
    }

    @media (max-width: 600px) {
        .container {
            margin: 0;
            border-radius: 0;
            height: 100vh;
        }

        .message-bubble {
            max-width: 85%;
        }

        .chat-header {
            padding: 12px 16px;
        }

        .messages-container {
            padding: 16px;
        }

        .input-area {
            padding: 12px 16px;
        }

        .header-username {
            font-size: 14px;
        }

        .input-field {
            font-size: 13px;
        }
    }
</style>

<body>
    <div class="container">
        <!-- Header -->
        <div class="chat-header">
            <a href="/messages" class="back-btn">← Geri</a>
            <div class="header-info">
                <div class="header-username">{{ other_user }}</div>

```
    <!-- Messages -->
    <div class="messages-container" id="messagesContainer">
        {% if messages %}
            {% for msg in messages %}
            <div class="message {% if msg[0] == current_user %}sent{% endif %}">
                <div>
                    <div class="message-bubble">{{ msg[2] }}</div>
                    <div class="message-time">{{ msg[3] }}</div>
                </div>
            </div>
            {% endfor %}
        {% endif %}
    </div>

    <!-- Input Area -->
    <div class="input-area">
        <textarea 
            class="input-field" 
            id="messageInput" 
            placeholder="Mesaj yaz..." 
            maxlength="500"
            rows="1"></textarea>
        <button class="send-btn" id="sendBtn" disabled onclick="sendMessage()">📤</button>
    </div>
</div>

<script>
    const otherUser = "{{ other_user }}";
    const currentUser = "{{ current_user }}";

    // Auto-expand textarea
    const textarea = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');

    textarea.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        
        sendBtn.disabled = this.value.trim().length === 0;
    });

    textarea.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    async function sendMessage() {
        const content = textarea.value.trim();
        
        if (!content) return;

        try {
            const formData = new FormData();
            formData.append('recipient', otherUser);
            formData.append('content', content);

            const response = await fetch('/send_message', {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                const data = await response.json();
                
                // Add message to UI
                const messagesContainer = document.getElementById('messagesContainer');
                const messageEl = document.createElement('div');
                messageEl.className = 'message sent';
                messageEl.innerHTML = `
                    <div>
                        <div class="message-bubble">${escapeHtml(content)}</div>
                        <div class="message-time">${data.created_at}</div>
                    </div>
                `;
                
                messagesContainer.appendChild(messageEl);
                
                // Clear input
                textarea.value = '';
                textarea.style.height = 'auto';
                sendBtn.disabled = true;
                
                // Scroll to bottom
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
                
            } else {
                alert('Mesaj gönderme hatası!');
            }
        } catch (error) {
            console.error('Error:', error);
            alert('Bir hata oluştu!');
        }
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Scroll to bottom on load
    window.addEventListener('load', () => {
        const container = document.getElementById('messagesContainer');
        container.scrollTop = container.scrollHeight;
    });
</script>
