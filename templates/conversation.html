    :root {
        --primary: #1D9BF0;
        --dark-bg: #000;
        --card-bg: #16181c;
        --border: #2f3336;
        --text-primary: #f7f9fa;
        --text-tertiary: #71767b;
        --hover-bg: #181818;
    }

    body {
        font-family: 'Satoshi', -apple-system, BlinkMacSystemFont, sans-serif;
        background: var(--dark-bg);
        color: var(--text-primary);
        line-height: 1.5;
    }

    .container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        max-width: 800px;
        margin: 0 auto;
    }

    .chat-header {
        border-bottom: 1px solid var(--border);
        padding: 16px 20px;
        display: flex;
        align-items: center;
        gap: 12px;
        background: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(10px);
        position: sticky;
        top: 0;
        z-index: 10;
    }

    .back-btn {
        background: none;
        border: none;
        color: var(--primary);
        font-size: 18px;
        cursor: pointer;
        padding: 8px;
    }

    .header-info {
        flex: 1;
    }

    .header-username {
        font-family: 'Outfit', sans-serif;
        font-size: 18px;
        font-weight: 800;
    }

    .header-handle {
        font-size: 13px;
        color: var(--text-tertiary);
    }

    .messages-container {
        flex: 1;
        overflow-y: auto;
        padding: 16px 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .message {
        display: flex;
        gap: 8px;
        margin-bottom: 4px;
    }

    .message.sent {
        flex-direction: row-reverse;
    }

    .message-bubble {
        max-width: 60%;
        background: var(--card-bg);
        padding: 12px 16px;
        border-radius: 16px;
        word-break: break-word;
        animation: slideUp 0.3s ease-out;
    }

    .message.sent .message-bubble {
        background: var(--primary);
        color: white;
    }

    @keyframes slideUp {
        from {
            opacity: 0;
            transform: translateY(10px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .message-time {
        font-size: 12px;
        color: var(--text-tertiary);
        margin-top: 4px;
        text-align: center;
    }

    .input-area {
        border-top: 1px solid var(--border);
        padding: 16px 20px;
        display: flex;
        gap: 12px;
        align-items: flex-end;
        background: var(--dark-bg);
    }

    .input-field {
        flex: 1;
        background: var(--card-bg);
        border: 1px solid var(--border);
        color: var(--text-primary);
        padding: 12px 16px;
        border-radius: 20px;
        font-family: 'Satoshi', sans-serif;
        font-size: 15px;
        resize: none;
        min-height: 48px;
        max-height: 120px;
        outline: none;
        transition: border 0.2s;
    }

    .input-field:focus {
        border-color: var(--primary);
    }

    .send-btn {
        background: var(--primary);
        color: white;
        border: none;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        transition: background 0.2s;
        flex-shrink: 0;
    }

    .send-btn:hover:not(:disabled) {
        background: #1a8cd8;
    }

    .send-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }

    .messages-container::-webkit-scrollbar {
        width: 8px;
    }

    .messages-container::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 4px;
    }

    @media (max-width: 600px) {
        .message-bubble {
            max-width: 85%;
        }

        .input-area {
            padding: 12px;
        }

        .input-field {
            font-size: 14px;
        }
    }
</style>

    <div class="container">
        <!-- Header -->
        <div class="chat-header">
            <a href="/messages" class="back-btn">← Geri</a>

```
    <!-- Messages -->
    <div class="messages-container" id="messagesContainer">
        {% if messages %}
            {% for msg in messages %}
            <div class="message {% if msg[0] == current_user %}sent{% endif %}" id="msg-{{ loop.index }}">
                <div>
                    <div class="message-bubble">{{ msg[2] }}</div>
                    <div class="message-time">{{ msg[3] }}</div>
                </div>
            </div>
            {% endfor %}
        {% endif %}
    </div>

    <!-- Input Area -->
    <div class="input-area">
        <textarea 
            class="input-field" 
            id="messageInput" 
            placeholder="Mesaj yaz..." 
            maxlength="500"
            rows="1"></textarea>
        <button class="send-btn" id="sendBtn" disabled onclick="sendMessage()">📤</button>
    </div>
</div>

<script>
    const otherUser = "{{ other_user }}";
    const currentUser = "{{ current_user }}";

    // Auto-expand textarea
    const textarea = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');

    textarea.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        
        sendBtn.disabled = this.value.trim().length === 0;
    });

    textarea.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    async function sendMessage() {
        const content = textarea.value.trim();
        
        if (!content) return;

        try {
            const formData = new FormData();
            formData.append('recipient', otherUser);
            formData.append('content', content);

            const response = await fetch('/send_message', {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                const data = await response.json();
                
                // Add message to UI
                const messagesContainer = document.getElementById('messagesContainer');
                const messageEl = document.createElement('div');
                messageEl.className = 'message sent';
                messageEl.innerHTML = `
                    <div>
                        <div class="message-bubble">${escapeHtml(content)}</div>
                        <div class="message-time">${data.created_at}</div>
                    </div>
                `;
                
                messagesContainer.appendChild(messageEl);
                
                // Clear input
                textarea.value = '';
                textarea.style.height = 'auto';
                sendBtn.disabled = true;
                
                // Scroll to bottom
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
                
            } else {
                alert('Mesaj gönderme hatası!');
            }
        } catch (error) {
            console.error('Error:', error);
            alert('Bir hata oluştu!');
        }
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Scroll to bottom on load
    window.addEventListener('load', () => {
        const container = document.getElementById('messagesContainer');
        container.scrollTop = container.scrollHeight;
    });
</script>
